onboarding = false
[keys]
prefix = "ctrl+space"
focus_pane_left = ["prefix+h", "ctrl+alt+h"]
focus_pane_down = ["prefix+j", "ctrl+alt+j"]
focus_pane_up = ["prefix+k", "ctrl+alt+k"]
focus_pane_right = ["prefix+l", "ctrl+alt+l"]
previous_tab = ["prefix+p", "ctrl+alt+["]
next_tab = ["prefix+n", "ctrl+alt+]"]
split_vertical = ["prefix+v", "ctrl+alt+d"]
split_horizontal = ["prefix+minus", "ctrl+alt+shift+d"]
zoom = ["prefix+z", "ctrl+alt+z"]

[theme]
name = "catppuccin"
auto_switch = false

[ui]
agent_panel_sort = "spaces"

[[keys.command]]
key = "ctrl+alt+v"
type = "pane"
command = "bash -c 'if jj root >/dev/null 2>&1; then if command -v jjui >/dev/null 2>&1; then jjui; else echo \"Error: jj repository detected, but jjui is not installed.\"; read -p \"Press Enter to exit...\"; fi; elif git rev-parse --is-inside-work-tree >/dev/null 2>&1; then if command -v lazygit >/dev/null 2>&1; then lazygit; else echo \"Error: git repository detected, but lazygit is not installed.\"; read -p \"Press Enter to exit...\"; fi; else if command -v lazygit >/dev/null 2>&1; then lazygit; elif command -v jjui >/dev/null 2>&1; then jjui; else echo \"Error: Neither lazygit nor jjui is setup.\"; read -p \"Press Enter to exit...\"; fi; fi'"
description = "run lazygit or jj UI"

