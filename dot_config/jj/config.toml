#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Eddie Huang"
email = "aigagror@gmail.com"

[ui]
pager = ["hunk", "pager"]
diff-formatter = ":git"

[[--scope]]
--when.environments = ["JJUI"]
[--scope.ui]
diff-formatter = "delta"
[--scope.merge-tools.delta]
program = "delta"
diff-args = ["--light", "$left", "$right"]
diff-expected-exit-codes = [0, 1]

[aliases]
l = ["log"]
g = ["git"]
d = ["describe"]
