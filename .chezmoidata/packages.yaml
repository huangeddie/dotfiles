# Declarative package manifest.
#
# On darwin this list is AUTHORITATIVE: `chezmoi apply` runs `brew bundle`
# with --cleanup --force, so any Homebrew package NOT listed here is
# uninstalled. Adding a package here installs it; removing it uninstalls it.
# Dependencies of listed packages are retained automatically.
#
# On linux, apt.install declares desired packages and apt.remove contains
# durable removal tombstones. Move a retired package from install to remove;
# packages absent from both lists are left untouched. Apt-calculated orphan
# dependencies are purged automatically.
#
# Unversioned formulae (python, zig) intentionally track the latest stable
# release rather than pinning a version.
packages:
  bun:
    global:
      [
        "prettier",
      ]
  darwin:
    custom: []
    taps:
      [
        "modem-dev/tap",
      ]
    # Homebrew refuses to load formulae from third-party taps unless they are
    # trusted. Scoped per-formula rather than per-tap, so formulae added to a
    # tap later are not implicitly authorized.
    trusted_formulae:
      [
        "modem-dev/tap/hunk",
      ]
    brews:
      [
        # Linked against by the mise-managed Ruby toolchain. Homebrew cannot
        # see that dependency, so without an explicit entry cleanup treats
        # these as orphans and removes them, breaking `ruby` at runtime.
        "gmp",
        "libyaml",
        "openssl@3",
        "bat",
        "bun",
        "chezmoi",
        "cloudflared",
        "fd",
        "ffmpeg",
        "fzf",
        "gh",
        "git-delta",
        "herdr",
        "jj",
        "jjui",
        "lazygit",
        "mise",
        "modem-dev/tap/hunk",
        "neovim",
        "python",
        "rust-analyzer",
        "stylua",
        "swiftformat",
        "television",
        "universal-ctags",
        "zig",
        "zoxide",
      ]
    casks:
      [
        "codex",
        "font-jetbrains-mono-nerd-font",
        "gcloud-cli",
        "ghostty",
      ]
  linux:
    custom:
      - name: television
        executable: tv
        install: |-
          curl -fsSL https://alexpasmantier.github.io/television/install.sh | bash
      - name: zoxide
        executable: zoxide
        install: |-
          curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh
      - name: herdr
        executable: herdr
        install: |-
          curl -fsSL https://herdr.dev/install.sh | sh
      - name: bun
        executable: bun
        setup: |-
          export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
          export PATH="$BUN_INSTALL/bin:$PATH"
        install: |-
          curl -fsSL https://bun.com/install | bash
    apt:
      blocked_prefixes: []
      install:
        [
          "neovim",
          "golang-go",
          "fd-find",
          "fzf",
          "git",
          "lazygit",
          "gh",
          "git-delta",
          "curl",
          "nodejs",
          "npm",
          "btop",
          "nvtop",
          "bat",
          "ghostty",
          "steam-installer",
          "steam-devices",
        ]
      remove: []
