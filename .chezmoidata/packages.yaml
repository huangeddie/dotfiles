# Declarative package manifest.
#
# On darwin this list is AUTHORITATIVE: `chezmoi apply` runs `brew bundle`
# with --cleanup --force, so any Homebrew package NOT listed here is
# uninstalled. Adding a package here installs it; removing it uninstalls it.
# Dependencies of listed packages are retained automatically.
#
# Unversioned formulae (python, zig) intentionally track the latest stable
# release rather than pinning a version.
#
# The linux/apt list is install-only; apt has no safe declarative prune.
packages:
  darwin:
    taps:
      [
        "modem-dev/tap",
      ]
    # Homebrew refuses to load formulae from third-party taps unless they are
    # trusted. Scoped per-formula rather than per-tap, so formulae added to a
    # tap later are not implicitly authorized.
    trusted_formulae:
      [
        "modem-dev/tap/hunk",
      ]
    brews:
      [
        # Linked against by the mise-managed Ruby toolchain. Homebrew cannot
        # see that dependency, so without an explicit entry cleanup treats
        # these as orphans and removes them, breaking `ruby` at runtime.
        "gmp",
        "libyaml",
        "openssl@3",

        "bat",
        "chezmoi",
        "cloudflared",
        "fd",
        "ffmpeg",
        "fzf",
        "gh",
        "git-delta",
        "herdr",
        "jj",
        "jjui",
        "lazygit",
        "mise",
        "modem-dev/tap/hunk",
        "neovim",
        "python",
        "rust-analyzer",
        "stylua",
        "swiftformat",
        "television",
        "universal-ctags",
        "zig",
        "zoxide",
      ]
    casks:
      [
        "codex",
        "font-jetbrains-mono-nerd-font",
        "gcloud-cli",
        "ghostty",
      ]
  linux:
    apt:
      [
        "neovim",
        "golang-go",
        "fd-find",
        "fzf",
        "git",
        "lazygit",
        "gh",
        "curl",
        "nodejs",
        "npm",
        "btop",
      ]
